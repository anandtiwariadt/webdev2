<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let rows = 5; 
        let stringPyramid = "";
        for (let i = 1; i <= rows; i++) {
           for (let j = 1; j < i; j++) {
              stringPyramid += " ";
        }
        for (let k = i; k <= 2 * rows - i; k++) {
        stringPyramid += "*";
        }
        stringPyramid += "\n";
        }
        console.log(stringPyramid);
    </script>
</body>
</html>
