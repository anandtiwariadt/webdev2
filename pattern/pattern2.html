<body>
    <script>
        for(let i=0;i<5;i++){
            let stars=""
            let space=""
            for(let s=i;s<4;s++){
                space+=" "
            }
            for(j=0;j<=i;j++){
                stars+="*"
            }
            console.log(space+stars)
        }
    </script>
