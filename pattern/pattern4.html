<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let i=5;i>0;i--){
            let stars=""
            let space=""
            for(s=0;s<=5-i;s++){
                space+=" "
            }
            for(j=1;j<=i;j++){
                stars+="*"
            }
            console.log(space+stars)
        }
    </script>
</body>
</html>
